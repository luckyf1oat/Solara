name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      D1_DATABASE_NAME: ${{ vars.D1_DATABASE_NAME || 'solara-db' }}
      PASSWORD: ${{ secrets.PASSWORD }}
      LANGUAGE: ${{ secrets.LANGUAGE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Ensure D1 database exists and patch wrangler config
        shell: bash
        run: |
          set -euo pipefail
          npx wrangler d1 list --json > d1-list.json

          DB_ID=$(node -e "const fs=require('fs');const name=process.env.D1_DATABASE_NAME;const list=JSON.parse(fs.readFileSync('d1-list.json','utf8'));const found=(list||[]).find(i=>i.name===name);if(found){process.stdout.write(found.uuid||found.id||'');}")

          if [ -z "$DB_ID" ]; then
            echo "D1 '$D1_DATABASE_NAME' not found, creating..."
            npx wrangler d1 create "$D1_DATABASE_NAME" --json > d1-created.json
            DB_ID=$(node -e "const fs=require('fs');const obj=JSON.parse(fs.readFileSync('d1-created.json','utf8'));process.stdout.write(obj.uuid||obj.id||'');")
          fi

          if [ -z "$DB_ID" ]; then
            echo "Failed to resolve D1 database id" >&2
            exit 1
          fi

          echo "Using D1 database id: $DB_ID"

          DB_ID="$DB_ID" node -e "const fs=require('fs');const cfg=JSON.parse(fs.readFileSync('wrangler.jsonc','utf8'));cfg.d1_databases=cfg.d1_databases||[];const idx=cfg.d1_databases.findIndex(d=>d.binding==='DB');const payload={binding:'DB',database_name:process.env.D1_DATABASE_NAME,database_id:process.env.DB_ID};if(idx===-1){cfg.d1_databases.push(payload);}else{cfg.d1_databases[idx]={...cfg.d1_databases[idx],...payload};}fs.writeFileSync('wrangler.ci.jsonc',JSON.stringify(cfg,null,2));"

      - name: Initialize D1 tables
        shell: bash
        run: |
          cat > schema.sql <<'SQL'
          CREATE TABLE IF NOT EXISTS playback_store (
            key TEXT PRIMARY KEY,
            value TEXT,
            updated_at TEXT DEFAULT CURRENT_TIMESTAMP
          );

          CREATE TABLE IF NOT EXISTS favorites_store (
            key TEXT PRIMARY KEY,
            value TEXT,
            updated_at TEXT DEFAULT CURRENT_TIMESTAMP
          );
          SQL

          npx wrangler d1 execute "$D1_DATABASE_NAME" --remote --file schema.sql

      - name: Sync optional worker secrets
        shell: bash
        run: |
          if [ -n "${PASSWORD:-}" ]; then
            printf '%s' "$PASSWORD" | npx wrangler secret put PASSWORD --config wrangler.ci.jsonc
          fi

          if [ -n "${LANGUAGE:-}" ]; then
            printf '%s' "$LANGUAGE" | npx wrangler secret put LANGUAGE --config wrangler.ci.jsonc
          fi

      - name: Deploy Worker
        run: npx wrangler deploy --config wrangler.ci.jsonc
